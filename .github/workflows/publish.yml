name: Publish to npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Dry run publish
        run: npm publish --dry-run --access public

      - name: Publish to npm
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        run: npm publish --access public
        env:
          # npm "Automation" token (Publish tokens require --otp in CI).
          # npm → GitHub integration may name this NPM_<token-id>; NPM_TOKEN also works.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NPM_6YQ7F89GT5PU9WQGP2SQSMOICNUPLP31HRZK }}
